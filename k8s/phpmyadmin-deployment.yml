apiVersion: apps/v1
kind: Deployment
metadata:
  name: phpmyadmin
spec:
  replicas: 1
  selector:
    matchLabels:
      app: phpmyadmin
  template:
    metadata:
      labels:
        app: phpmyadmin
    spec:
      containers:
      - name: phpmyadmin
        image: phpmyadmin
        ports:
          - containerPort: 80
        env:
          - name: PMA_ARBITRARY
            value: "1"
          - name: PMA_HOST
            value: "database"
          - name: PMA_PORT
            value: "3306"
          - name: PMA_USER
            value: "root"

---
apiVersion: v1
kind: Service
metadata:
  name: phpmyadmin
spec:
  type: NodePort
  selector:
    app: phpmyadmin
  ports:
    - port: 8080
      targetPort: 80
      nodePort: 30080