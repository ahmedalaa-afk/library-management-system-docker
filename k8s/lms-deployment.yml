apiVersion: apps/v1
kind: Deployment
metadata:
  name: lms-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lms-service
  template:
    metadata:
      labels:
        app: lms-service
    spec:
      containers:
        - name: library-management-system
          image: ahmedafk/library-management-system:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
          env:
            - name: FLASK_APP
              value: "app.py"
            - name: FLASK_ENV
              value: "development"
            - name: FLASK_RUN_HOST
              value: "0.0.0.0"
---
apiVersion: v1
kind: Service
metadata:
  name: lms-service
spec:
  type: NodePort
  selector:
    app: lms-service
  ports:
    - port: 5000
      targetPort: 5000
      nodePort: 30500
