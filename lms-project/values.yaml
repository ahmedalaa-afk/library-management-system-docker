lms:
  replicas: 1
  name: lms-app
  image: ahmedafk404/library-management-system:latest
  containerPort: 5000
  service:
    name: lms-service
    type: ClusterIP
    port: 80
    targetPort: 80

nginx:
  name: nginx
  image: nginx:latest
  containerPort: 80

mysql:
  name: database
  image: mysql:8.0
  containerPort: 3306
  replicas: 1
  pvc:
    name: lms-pvc
    storage: 3Gi
    volumeMode: Filesystem
    accessModes:
      - ReadWriteOnce
  service:
    name: mysql-service
    type: ClusterIP
    port: 3306
    targetPort: 3306

phpmyadmin:
  name: phpmyadmin
  image: phpmyadmin:latest
  containerPort: 80
  replicas: 1
  service:
    name: phpmyadmin-service
    type: ClusterIP
    port: 8080
    targetPort: 80